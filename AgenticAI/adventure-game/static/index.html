<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Game Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #2d2d2d;
            padding: 1rem;
            border-bottom: 2px solid #3d3d3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { color: #4a9eff; font-size: 1.5rem; }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .user { background: #2d4a7c; align-self: flex-end; }
        .assistant { background: #2d2d2d; align-self: flex-start; }
        .message-content { line-height: 1.6; }
        .message-content p { margin: 0.5rem 0; }
        .message-content code {
            background: #1a1a1a;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
        }
        #input-container {
            background: #2d2d2d;
            padding: 1rem;
            border-top: 2px solid #3d3d3d;
            display: flex;
            gap: 0.5rem;
        }
        #message-input {
            flex: 1;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #3d3d3d;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
        }
        #message-input:focus { outline: none; border-color: #4a9eff; }
        #send-button {
            padding: 0.75rem 1.5rem;
            background: #4a9eff;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #send-button:hover { background: #3a8eef; }
        #send-button:disabled {
            background: #3d3d3d;
            cursor: not-allowed;
        }
        .typing { opacity: 0.7; font-style: italic; }
    </style>
</head>
<body>
    <header>
        <h1>🎮 Adventure Game Chat</h1>
        <nav><a href="/test.html" style="color: #4a9eff; text-decoration: none;">🔧 Test MCP</a></nav>
    </header>
    
    <div id="chat-container"></div>
    
    <div id="input-container">
        <input 
            type="text" 
            id="message-input" 
            placeholder="Type your command or message..."
            autocomplete="off"
        >
        <button id="send-button">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        
        let isStreaming = false;

        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="message-content">${marked.parse(content)}</div>`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            addMessage(message, 'user');
            messageInput.value = '';
            isStreaming = true;
            sendButton.disabled = true;

            const assistantDiv = addMessage('', 'assistant');
            const contentDiv = assistantDiv.querySelector('.message-content');
            let fullResponse = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            fullResponse += data;
                            contentDiv.innerHTML = marked.parse(fullResponse);
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    }
                }
            } catch (error) {
                contentDiv.innerHTML = `<p style="color: #ff6b6b;">Error: ${error.message}</p>`;
            }

            isStreaming = false;
            sendButton.disabled = false;
            messageInput.focus();
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        messageInput.focus();
    </script>
</body>
</html>
