<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" fill="#1a1a2e" rx="8"/>
  <text x="150" y="18" fill="#ddd" font-size="11" font-family="sans-serif" font-weight="bold" text-anchor="middle">Isolation Forest — Anomaly Scores</text>
  <!-- axes -->
  <line x1="30" y1="190" x2="280" y2="190" stroke="#555"/>
  <line x1="30" y1="28" x2="30" y2="190" stroke="#555"/>
  <text x="155" y="207" fill="#888" font-size="8" font-family="monospace" text-anchor="middle">Session Index</text>
  <text x="12" y="110" fill="#888" font-size="8" font-family="monospace" text-anchor="middle" transform="rotate(-90,12,110)">Anomaly Score</text>
  <!-- Threshold line -->
  <line x1="30" y1="65" x2="280" y2="65" stroke="#e74c3c" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="268" y="58" fill="#e74c3c" font-size="7" font-family="sans-serif" text-anchor="end">threshold</text>
  <!-- Normal sessions (bars below threshold, blue) -->
  <rect x="38"  y="140" width="8" height="50" fill="#3498db" opacity="0.6"/>
  <rect x="50"  y="125" width="8" height="65" fill="#3498db" opacity="0.6"/>
  <rect x="62"  y="150" width="8" height="40" fill="#3498db" opacity="0.6"/>
  <rect x="74"  y="135" width="8" height="55" fill="#3498db" opacity="0.6"/>
  <rect x="86"  y="145" width="8" height="45" fill="#3498db" opacity="0.6"/>
  <rect x="98"  y="130" width="8" height="60" fill="#3498db" opacity="0.6"/>
  <rect x="110" y="155" width="8" height="35" fill="#3498db" opacity="0.6"/>
  <rect x="122" y="142" width="8" height="48" fill="#3498db" opacity="0.6"/>
  <!-- Anomaly (bar above threshold, red) -->
  <rect x="134" y="42"  width="8" height="148" fill="#e74c3c" opacity="0.8"/>
  <!-- More normal sessions -->
  <rect x="146" y="148" width="8" height="42" fill="#3498db" opacity="0.6"/>
  <rect x="158" y="138" width="8" height="52" fill="#3498db" opacity="0.6"/>
  <rect x="170" y="155" width="8" height="35" fill="#3498db" opacity="0.6"/>
  <rect x="182" y="132" width="8" height="58" fill="#3498db" opacity="0.6"/>
  <rect x="194" y="145" width="8" height="45" fill="#3498db" opacity="0.6"/>
  <!-- Another anomaly -->
  <rect x="206" y="38"  width="8" height="152" fill="#e74c3c" opacity="0.8"/>
  <!-- More normal -->
  <rect x="218" y="150" width="8" height="40" fill="#3498db" opacity="0.6"/>
  <rect x="230" y="140" width="8" height="50" fill="#3498db" opacity="0.6"/>
  <rect x="242" y="152" width="8" height="38" fill="#3498db" opacity="0.6"/>
  <!-- Anomaly -->
  <rect x="254" y="48"  width="8" height="142" fill="#e74c3c" opacity="0.8"/>
  <rect x="266" y="145" width="8" height="45" fill="#3498db" opacity="0.6"/>
  <!-- Legend -->
  <rect x="50" y="28" width="10" height="8" fill="#3498db" opacity="0.6"/>
  <text x="64" y="35" fill="#ccc" font-size="7" font-family="sans-serif">Normal</text>
  <rect x="105" y="28" width="10" height="8" fill="#e74c3c" opacity="0.8"/>
  <text x="119" y="35" fill="#ccc" font-size="7" font-family="sans-serif">Anomaly</text>
</svg>
