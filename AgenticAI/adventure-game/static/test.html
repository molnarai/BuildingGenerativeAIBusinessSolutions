<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Server Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 2rem;
        }
        header {
            background: #2d2d2d;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { color: #4a9eff; font-size: 1.5rem; }
        nav a {
            color: #4a9eff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            background: #1a1a1a;
            border-radius: 4px;
        }
        nav a:hover { background: #3d3d3d; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .panel {
            background: #2d2d2d;
            padding: 1.5rem;
            border-radius: 8px;
        }
        h2 {
            color: #4a9eff;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #b0b0b0;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #3d3d3d;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
            font-family: monospace;
        }
        textarea { min-height: 150px; resize: vertical; }
        button {
            padding: 0.75rem 1.5rem;
            background: #4a9eff;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
        }
        button:hover { background: #3a8eef; }
        button:disabled {
            background: #3d3d3d;
            cursor: not-allowed;
        }
        pre {
            background: #1a1a1a;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .success { color: #4ade80; }
        .error { color: #ff6b6b; }
        .quick-commands {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .quick-commands button {
            width: auto;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            background: #3d3d3d;
        }
        .quick-commands button:hover { background: #4d4d4d; }
    </style>
</head>
<body>
    <header>
        <h1>🔧 MCP Server Test</h1>
        <nav>
            <a href="/">← Back to Chat</a>
        </nav>
    </header>

    <div class="container">
        <div class="panel">
            <h2>MCP Request</h2>
            
            <div class="form-group">
                <label>Tool</label>
                <select id="tool-select">
                    <option value="advance_game">advance_game</option>
                    <option value="reset">reset</option>
                    <option value="describe_world">describe_world</option>
                </select>
            </div>

            <div class="form-group" id="command-group">
                <label>Command</label>
                <input type="text" id="command-input" placeholder="look">
                <div class="quick-commands">
                    <button onclick="setCommand('look')">look</button>
                    <button onclick="setCommand('go hall')">go hall</button>
                    <button onclick="setCommand('go kitchen')">go kitchen</button>
                    <button onclick="setCommand('take apple')">take apple</button>
                    <button onclick="setCommand('take key')">take key</button>
                </div>
            </div>

            <div class="form-group">
                <label>Raw JSON-RPC Request</label>
                <textarea id="request-json"></textarea>
            </div>

            <button onclick="sendRequest()">Send Request</button>
            <button onclick="updateRequest()" style="background: #3d3d3d; margin-top: 0.5rem;">Update JSON</button>
        </div>

        <div class="panel">
            <h2>Response</h2>
            <pre id="response-output">Response will appear here...</pre>
        </div>
    </div>

    <script>
        const MCP_URL = 'http://localhost:8000/sse';
        
        function setCommand(cmd) {
            document.getElementById('command-input').value = cmd;
            updateRequest();
        }

        function updateRequest() {
            const tool = document.getElementById('tool-select').value;
            const command = document.getElementById('command-input').value;
            
            let params = {};
            if (tool === 'advance_game') {
                params = { name: tool, arguments: { command: command } };
            } else {
                params = { name: tool, arguments: {} };
            }

            const request = {
                jsonrpc: "2.0",
                method: "tools/call",
                params: params,
                id: Date.now()
            };

            document.getElementById('request-json').value = JSON.stringify(request, null, 2);
        }

        async function sendRequest() {
            const requestText = document.getElementById('request-json').value;
            const output = document.getElementById('response-output');
            
            try {
                const request = JSON.parse(requestText);
                output.textContent = 'Sending request...';
                
                const response = await fetch(MCP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                const result = await response.json();
                output.innerHTML = `<span class="success">Status: ${response.status}</span>\n\n${JSON.stringify(result, null, 2)}`;
            } catch (error) {
                output.innerHTML = `<span class="error">Error: ${error.message}</span>`;
            }
        }

        document.getElementById('tool-select').addEventListener('change', function() {
            const commandGroup = document.getElementById('command-group');
            commandGroup.style.display = this.value === 'advance_game' ? 'block' : 'none';
            updateRequest();
        });

        document.getElementById('command-input').addEventListener('input', updateRequest);

        // Initialize
        updateRequest();
    </script>
</body>
</html>
