{{ define "main" }}
    {{ partial "breadcrumbs.html" . }}
    <article class="blog-article">
        <header class="blog-header">
            <h1>{{ .Title }}</h1>
            {{ if .Params.due_date }}
            <div class="due-date">
                <strong>Due Date:</strong> {{ .Params.due_date | time.Format "January 2, 2006" }}
            </div>
            {{ end }}
        </header>
        {{ .Content }}
    </article>
{{ end }}
