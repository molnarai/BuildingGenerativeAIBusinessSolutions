<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" fill="#1a1a2e" rx="8"/>
  <text x="150" y="18" fill="#ddd" font-size="11" font-family="sans-serif" font-weight="bold" text-anchor="middle">K-means Clustering of Agent Sessions</text>
  <!-- axes -->
  <line x1="30" y1="200" x2="285" y2="200" stroke="#555"/>
  <line x1="30" y1="25" x2="30" y2="200" stroke="#555"/>
  <text x="155" y="215" fill="#888" font-size="8" font-family="monospace" text-anchor="middle">Latency</text>
  <text x="12" y="112" fill="#888" font-size="8" font-family="monospace" text-anchor="middle" transform="rotate(-90,12,112)">Token Count</text>
  <!-- Cluster 1 (red) - fast/simple -->
  <circle cx="60" cy="165" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="72" cy="172" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="55" cy="155" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="80" cy="160" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="65" cy="178" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="48" cy="168" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="75" cy="150" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="90" cy="170" r="4" fill="#e74c3c" opacity="0.7"/>
  <!-- Cluster 1 centroid -->
  <circle cx="68" cy="165" r="7" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <line x1="63" y1="165" x2="73" y2="165" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="68" y1="160" x2="68" y2="170" stroke="#e74c3c" stroke-width="1.5"/>
  <!-- Cluster 2 (green) - slow/complex -->
  <circle cx="190" cy="65" r="4" fill="#2ecc71" opacity="0.7"/>
  <circle cx="210" cy="55" r="4" fill="#2ecc71" opacity="0.7"/>
  <circle cx="200" cy="75" r="4" fill="#2ecc71" opacity="0.7"/>
  <circle cx="220" cy="68" r="4" fill="#2ecc71" opacity="0.7"/>
  <circle cx="185" cy="50" r="4" fill="#2ecc71" opacity="0.7"/>
  <circle cx="205" cy="42" r="4" fill="#2ecc71" opacity="0.7"/>
  <circle cx="230" cy="58" r="4" fill="#2ecc71" opacity="0.7"/>
  <circle cx="195" cy="82" r="4" fill="#2ecc71" opacity="0.7"/>
  <!-- Cluster 2 centroid -->
  <circle cx="205" cy="62" r="7" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <line x1="200" y1="62" x2="210" y2="62" stroke="#2ecc71" stroke-width="1.5"/>
  <line x1="205" y1="57" x2="205" y2="67" stroke="#2ecc71" stroke-width="1.5"/>
  <!-- Cluster 3 (blue) - medium -->
  <circle cx="130" cy="120" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="145" cy="110" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="120" cy="130" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="140" cy="125" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="155" cy="118" r="4" fill="#3498db" opacity="0.7"/>
  <circle cx="135" cy="135" r="4" fill="#3498db" opacity="0.7"/>
  <!-- Cluster 3 centroid -->
  <circle cx="138" cy="123" r="7" fill="none" stroke="#3498db" stroke-width="2"/>
  <line x1="133" y1="123" x2="143" y2="123" stroke="#3498db" stroke-width="1.5"/>
  <line x1="138" y1="118" x2="138" y2="128" stroke="#3498db" stroke-width="1.5"/>
  <!-- Legend -->
  <circle cx="45" cy="38" r="4" fill="#e74c3c"/>
  <text x="53" y="41" fill="#ccc" font-size="8" font-family="sans-serif">Fast/Simple</text>
  <circle cx="45" cy="52" r="4" fill="#3498db"/>
  <text x="53" y="55" fill="#ccc" font-size="8" font-family="sans-serif">Medium</text>
  <circle cx="45" cy="66" r="4" fill="#2ecc71"/>
  <text x="53" y="69" fill="#ccc" font-size="8" font-family="sans-serif">Slow/Complex</text>
</svg>
