<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" fill="#1a1a2e" rx="8"/>
  <text x="150" y="18" fill="#ddd" font-size="11" font-family="sans-serif" font-weight="bold" text-anchor="middle">Association Rules — Tool Call Sequences</text>
  <!-- Nodes -->
  <circle cx="55" cy="110" r="22" fill="#2c3e50" stroke="#3498db" stroke-width="2"/>
  <text x="55" y="107" fill="#3498db" font-size="7" font-family="monospace" text-anchor="middle">web</text>
  <text x="55" y="116" fill="#3498db" font-size="7" font-family="monospace" text-anchor="middle">search</text>
  <circle cx="150" cy="60" r="22" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
  <text x="150" y="57" fill="#2ecc71" font-size="7" font-family="monospace" text-anchor="middle">citation</text>
  <text x="150" y="66" fill="#2ecc71" font-size="7" font-family="monospace" text-anchor="middle">format</text>
  <circle cx="150" cy="160" r="22" fill="#2c3e50" stroke="#e74c3c" stroke-width="2"/>
  <text x="150" y="157" fill="#e74c3c" font-size="7" font-family="monospace" text-anchor="middle">retrieval</text>
  <text x="150" y="166" fill="#e74c3c" font-size="7" font-family="monospace" text-anchor="middle">retry</text>
  <circle cx="245" cy="60" r="22" fill="#2c3e50" stroke="#2ecc71" stroke-width="2"/>
  <text x="245" y="57" fill="#2ecc71" font-size="7" font-family="monospace" text-anchor="middle">summa</text>
  <text x="245" y="66" fill="#2ecc71" font-size="7" font-family="monospace" text-anchor="middle">rize</text>
  <circle cx="245" cy="160" r="22" fill="#2c3e50" stroke="#e67e22" stroke-width="2"/>
  <text x="245" y="157" fill="#e67e22" font-size="7" font-family="monospace" text-anchor="middle">task</text>
  <text x="245" y="166" fill="#e67e22" font-size="7" font-family="monospace" text-anchor="middle">failure</text>
  <!-- Arrows with confidence labels -->
  <!-- web_search → citation_format (93%) -->
  <line x1="75" y1="98" x2="128" y2="72" stroke="#2ecc71" stroke-width="2.5" opacity="0.8"/>
  <polygon points="128,72 122,78 120,71" fill="#2ecc71"/>
  <text x="92" y="78" fill="#9b59b6" font-size="8" font-family="sans-serif" font-weight="bold">93%</text>
  <!-- citation_format → summarize (78%) -->
  <line x1="172" y1="60" x2="223" y2="60" stroke="#2ecc71" stroke-width="2" opacity="0.6"/>
  <polygon points="223,60 217,56 217,64" fill="#2ecc71"/>
  <text x="195" y="54" fill="#9b59b6" font-size="8" font-family="sans-serif" font-weight="bold">78%</text>
  <!-- retrieval_retry → task_failure (67%) -->
  <line x1="172" y1="160" x2="223" y2="160" stroke="#e74c3c" stroke-width="1.8" opacity="0.7"/>
  <polygon points="223,160 217,156 217,164" fill="#e74c3c"/>
  <text x="195" y="154" fill="#9b59b6" font-size="8" font-family="sans-serif" font-weight="bold">67%</text>
  <!-- web_search → retrieval_retry (35%) -->
  <line x1="68" y1="128" x2="135" y2="143" stroke="#888" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
  <polygon points="135,143 128,141 130,148" fill="#888"/>
  <text x="92" y="143" fill="#888" font-size="7" font-family="sans-serif">35%</text>
  <!-- Legend -->
  <text x="20" y="205" fill="#9b59b6" font-size="8" font-family="sans-serif">% = confidence (support × lift)</text>
  <line x1="190" y1="202" x2="210" y2="202" stroke="#2ecc71" stroke-width="2"/>
  <text x="214" y="205" fill="#ccc" font-size="7" font-family="sans-serif">success path</text>
  <line x1="190" y1="192" x2="210" y2="192" stroke="#e74c3c" stroke-width="2"/>
  <text x="214" y="195" fill="#ccc" font-size="7" font-family="sans-serif">failure path</text>
</svg>
