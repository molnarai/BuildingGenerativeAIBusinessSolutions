# syntax highlight settings
[markup]
  [markup.highlight]
    # style = "dracula"
    style = "friendly"  # or github, dracula, etc."monokai"
    lineNos = false
    lineNumbersInTable = false
  [markup.goldmark.renderer]
    # Enable to include inline HTML
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['$$', '$$'], ['\[', '\]']]
      inline = [['$', '$'], ['\(', '\)']]


[outputFormats.Reveal]
baseName = "index"
mediaType = "text/html"
isHTML = true

[params.reveal_hugo]
theme = "black"
highlight_theme = "monokai"
slide_number = true
history = true
transition = "slide"

[security]
  [security.http]
    urls = ['.*insight-gsu-edu-msa8700-public-files-us-east-1\.s3\.us-east-1\.amazonaws\.com.*', '.*cdn\.jsdelivr\.net.*']

[sitemap]
  changeFreq = ''
  disable = false
  filename = 'sitemap.xml'
  priority = -1

[taxonomies]
  category = "categories"
  tag = "tags"

[params.wiki]
  enableSearch = true
  enableTOC = true
  enableBreadcrumbs = true
